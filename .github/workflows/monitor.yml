name: Server Monitor

on:
  schedule:
    # Runs every 5 minutes
    - cron: "*/5 * * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  check-status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Restore last known state from cache
      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: last_state.json
          key: server-state

      - name: Check server status
        env:
          NITRADO_TOKEN: ${{ secrets.NITRADO_TOKEN }}
          NITRADO_SERVICE_ID: ${{ secrets.NITRADO_SERVICE_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_ALERT_ROLE_ID: ${{ secrets.DISCORD_ALERT_ROLE_ID }}
        run: python monitor.py

      # Save state for next run
      - name: Save state cache
        uses: actions/cache/save@v4
        with:
          path: last_state.json
          key: server-state-${{ github.run_id }}
